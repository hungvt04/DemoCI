name: Spring Boot CI

on: # Thực thi khi nào
  push: # Khi push code vào nhánh main
    branches:
      - main

  pull_request: # Khi merge pull request vào nhánh main
    branches:
      - main

jobs: # Công việc cụ thể
  build:

    runs-on: ubuntu-latest # Khởi tại máy để thực thi

    steps: # Các bước thực thi cụ thể

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build
        run: mvn clean package

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Tag
        run: echo "SHA_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/springboot-cicd-demo:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/springboot-cicd-demo:${SHA_TAG} \
            .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/springboot-cicd-demo:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/springboot-cicd-demo:${SHA_TAG}